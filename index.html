<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>exportfil-netto</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --card-2: #1c222b;
    --border: #2a313c;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #3b82f6;
    --accent-hover: #60a5fa;
    --warn: #fbbf24;
    --warn-bg: rgba(251, 191, 36, 0.12);
    --danger: #f87171;
    --danger-bg: rgba(248, 113, 113, 0.14);
    --ok: #34d399;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 32px 16px;
    line-height: 1.5;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin: 0 0 16px; font-weight: 600; }
  .drop {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .drop:hover, .drop.dragover { border-color: var(--accent); background: var(--card-2); }
  .drop p { margin: 4px 0; color: var(--muted); }
  .drop strong { color: var(--text); }
  input[type="file"] { display: none; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
  select, input[type="number"] {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    background: var(--card-2);
    color: var(--text);
    font-family: inherit;
  }
  select option { background: var(--card); color: var(--text); }
  select:focus, input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .checkbox { display: flex; align-items: center; gap: 6px; font-size: 14px; }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 9px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover { background: var(--accent-hover); }
  button.secondary { background: var(--card-2); color: var(--text); border: 1px solid var(--border); }
  button.secondary:hover { background: var(--border); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
  .rules-bar { display: flex; gap: 16px; align-items: end; flex-wrap: wrap; padding: 12px 14px; margin-bottom: 16px; background: var(--card-2); border: 1px solid var(--border); border-radius: 6px; }
  .rules-bar .field { min-width: 120px; }
  .rules-bar input[type="number"] { width: 110px; }
  .stat { font-size: 14px; }
  .stat strong { display: block; font-size: 22px; font-weight: 600; }
  .stat .muted { color: var(--muted); font-size: 12px; }
  .table-wrap { overflow-x: auto; max-height: 600px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { background: var(--card-2); font-weight: 600; position: sticky; top: 0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; color: var(--muted); }
  tbody tr:hover { background: var(--card-2); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; margin-right: 4px; }
  .badge.warn { background: var(--warn-bg); color: var(--warn); }
  .badge.danger { background: var(--danger-bg); color: var(--danger); }
  .hidden { display: none !important; }
  .actions { display: flex; gap: 8px; margin-top: 16px; }
  .empty { padding: 40px; text-align: center; color: var(--muted); }
  .error { background: var(--danger-bg); color: var(--danger); padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-top: 12px; }
  .loading { display: flex; align-items: center; gap: 10px; color: var(--muted); margin-top: 12px; font-size: 14px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .note { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>exportfil-netto</h1>
  <p class="sub">Upload an article export. Flags rows where the buy price looks wrong.</p>

  <div class="card">
    <div class="drop" id="drop">
      <p><strong>Drop Excel file here</strong> or click to browse</p>
      <p>.xlsx, .xls, .csv</p>
      <input type="file" id="file" accept=".xlsx,.xls,.csv">
    </div>
    <div id="file-info" class="sub hidden" style="margin-top: 12px; margin-bottom: 0;"></div>
    <div id="loading" class="loading hidden"><div class="spinner"></div><span id="loading-text">Reading file…</span></div>
    <div id="error" class="error hidden"></div>
  </div>

  <div class="card">
    <h2>Rules</h2>
    <div class="rules-bar">
      <div class="field"><label>Buy below</label><input type="number" id="min-buy" value="1.50" step="0.01" min="0"></div>
      <div class="field"><label>Margin below (%)</label><input type="number" id="min-margin" value="0" step="1" min="-100" max="100"></div>
      <div class="field"><label>Margin above (%)</label><input type="number" id="max-margin" value="95" step="1" min="0" max="100"></div>
    </div>
    <h2 style="margin-top: 4px;">Ignore categories</h2>
    <div class="rules-bar" style="margin-bottom: 0;">
      <label class="checkbox"><input type="checkbox" data-cat="338" checked> 338 — BÄRKASSAR</label>
      <label class="checkbox"><input type="checkbox" data-cat="276" checked> 276 — PANT INLÖSEN</label>
      <label class="checkbox"><input type="checkbox" data-cat="248" checked> 248 — PANT FÖRSÄLJNING</label>
    </div>
  </div>

  <div class="card hidden" id="results-card">
    <div class="stats" id="stats"></div>
    <div id="display-note" class="note hidden"></div>
    <div class="table-wrap" id="table-wrap"></div>
    <div class="actions">
      <button id="download">Download as Excel</button>
      <button class="secondary" id="reset">Start over</button>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const FIELDS = ['ean', 'bnr', 'name', 'buy', 'sales'];
const DISPLAY_CAP = 500;
const AUTO_MAP = {
  ean: ['ean/plu', 'ean', 'streckkod', 'barcode', 'gtin', 'plu'],
  bnr: ['bnr', 'b-nr', 'beställningsnr', 'bestnr', 'beställningsnummer', 'artikelnr', 'artikelnummer'],
  name: ['benämning', 'produktnamn', 'artikelnamn', 'beskrivning', 'namn', 'product', 'name', 'description'],
  buy: ['ink.pris', 'ink. pris', 'inköpspris', 'inkpris', 'köppris', 'inpris', 'buy', 'cost', 'purchase'],
  sales: ['fsg. pris', 'fsg.pris', 'fsg', 'försäljningspris', 'säljpris', 'utpris', 'sales', 'sale', 'price', 'pris']
};
const KATEGORI_TERMS = ['kategori', 'category'];
const CATEGORY_NAMES = {
  208: "KYLD FISK&SKALDJURSKONSERV", 209: "SMÅMÅL MEJERI", 210: "VEGETABILISK MEJERI",
  211: "GRÖNSAKSKONSERVER", 212: "BARNMAT", 213: "BAKNING", 214: "KAFFE, TE & CHOKLAD",
  215: "FÄRSK FISK&SKALDJUR KFP", 216: "OKYLD JUICE & FRUKTDRYCK", 218: "FRUKTDRYCKER",
  219: "MATFETT", 220: "ÄGG", 221: "FRYST FISK & SKALDJUR", 222: "MEJERI",
  223: "ÖL, VIN OCH CIDER", 224: "GODIS", 225: "MJUKT MATBRÖD PACKAT",
  226: "OST (KONSUMENTPACK)", 227: "GLASS", 228: "LÖSVIKTSGODIS",
  229: "HÅRT BRÖD & MATKEX", 230: "GRÖNSAKER", 231: "FRUKT & BÄR",
  232: "FÄRSKT KÖTT BUTIKSPACKAT", 233: "MATCHARK (KONSUMENTPACK)",
  234: "FÄRDIGMAT (KONSUMENTPACK)", 236: "FIKABRÖD", 237: "FÄRSK FÅGEL",
  238: "MANUELL CHARK", 239: "FÄRDIGMAT & FISKKONSERVER", 240: "FLINGOR & GRYN",
  241: "PASTA & SÅS", 242: "KRYDDOR", 243: "HÄLSA", 244: "SNACKS",
  245: "NATURGODIS LÖSVIKT", 247: "UTLÄNDSKA MATKONCEPT", 248: "PANT FÖRSÄLJNING",
  249: "LÄSK OCH SAFT", 250: "MATÖVERKÄNSLIGHET", 252: "BUTIKSBAKAT BRÖD",
  253: "OST (MANUELL)", 254: "OLJA VINÄGER", 255: "SMAKSÄTTNING",
  256: "SYLT MOS MARMELAD", 257: "MELLANMÅL & EFTERRÄTTER",
  258: "FÄRSKT KÖTT (KONSUMENTPACK)", 259: "FUNKTIONSDRYCKER",
  261: "TILLBEHÖRSSALLADER", 262: "PÅLÄGGSCHARK (KONSUMENTPACK)",
  264: "DELI (KONSUMENTPACK)", 265: "FRYST FÄRDIGLAGAT",
  266: "FRYST GRÖNSAKER&POTATIS", 267: "FRYST FRUKT, BÄR&DESSERT",
  268: "FRYST FÅGEL", 269: "VATTEN", 270: "BUTIKSGRILLAT MANUELLT",
  275: "FÄRSKA VEG PROTEINER", 276: "PANT INLÖSEN", 311: "GASTRONOMI",
  314: "HELG & FEST", 315: "FÖRVARING TVÄTT & STRY",
  319: "TVÄTT- & SKÖLJMEDEL", 320: "BARNTILLBEHÖR", 321: "RENGÖRING",
  322: "KROPPSVÅRD", 323: "TISSUE PAPPER", 325: "DJURMAT & TILLBEHÖR",
  326: "MATEMBALLAGE", 327: "ANSIKTSVÅRD", 328: "MUNVÅRD MUNHYGIEN",
  329: "HÅRVÅRD", 330: "INTIMHYGIEN", 331: "LJUS", 332: "SKRIV & KONTOR",
  334: "TIDSKRIFTER", 335: "DAGSTIDNINGAR", 336: "LÄKEMEDEL RECEPTFRIA",
  337: "GRATTISKORT & PRESENTPAPPER", 338: "BÄRKASSAR", 341: "LEKSAKER",
  344: "CIGARETTER", 345: "SNUS", 351: "HÅRBORTTAGNING",
  352: "PORTO/FÖRKÖPSHÄFTEN", 355: "SERVETTER&ENG.MATERIAL",
  356: "BATTERIER&SÄKRINGAR", 357: "TELEKONTANTKORT",
  358: "UPPLEVELSER&PRESENTKORT", 464: "CYKLAR", 513: "HOBBY SY & STICKA",
  533: "LJUSKÄLLOR", 550: "BEKÄMPNING & REDSKAP", 553: "JORD, GÖDNING & VED",
  559: "GRILLAR", 560: "SOMMARPLANTOR", 561: "TRÄDGÅRDSVÄXTER",
  562: "BLOMMOR", 566: "KRUKOR"
};

let headers = [];
let rows = [];
let dedupedRows = [];
let rawRowCount = 0;
let duplicatesRemoved = 0;
let ignoredByCategory = 0;
let results = [];
let sourceFilename = '';
let storeName = '';
let columnIdx = null;

const drop = $('drop');
const fileInput = $('file');

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', (e) => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', (e) => {
  e.preventDefault();
  drop.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files.length) handleFile(e.target.files[0]);
});

function showError(msg) {
  $('error').textContent = msg;
  $('error').classList.remove('hidden');
}
function clearError() { $('error').classList.add('hidden'); }

function handleFile(file) {
  clearError();
  sourceFilename = file.name.replace(/\.[^.]+$/, '');
  $('file-info').classList.add('hidden');
  $('results-card').classList.add('hidden');
  setLoading(`Reading ${file.name}…`);

  const reader = new FileReader();
  reader.onload = (e) => {
    const buf = new Uint8Array(e.target.result);
    requestAnimationFrame(() => setTimeout(() => {
      try {
        setLoading('Parsing rows…');
        const wb = XLSX.read(buf, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', raw: true });
        if (!json.length) { setLoading(null); showError('File appears empty.'); return; }

        const layout = detectLayout(json);
        storeName = layout.storeName;
        headers = json[layout.headerRowIdx].map(h => String(h ?? '').trim());
        const allRows = json.slice(layout.headerRowIdx + 1).filter(r => r.some(c => c !== '' && c != null));
        rawRowCount = allRows.length;

        columnIdx = autoMap();
        const missing = FIELDS.filter(f => columnIdx[f] === -1);
        if (missing.length) {
          setLoading(null);
          showError(`Could not auto-detect column(s): ${missing.join(', ')}. Headers found: ${headers.join(', ')}`);
          return;
        }

        dedupedRows = dedupeRows(allRows, columnIdx);
        duplicatesRemoved = rawRowCount - dedupedRows.length;

        const storeLabel = storeName ? ` — Butik: ${storeName}` : '';
        $('file-info').textContent = `${file.name} — ${rawRowCount.toLocaleString()} rows, ${headers.length} columns${storeLabel}`;
        $('file-info').classList.remove('hidden');

        analyze();
        setLoading(null);
        downloadExcel();
      } catch (err) {
        setLoading(null);
        showError('Could not read file: ' + err.message);
      }
    }, 0));
  };
  reader.readAsArrayBuffer(file);
}

function setLoading(msg) {
  if (msg == null) { $('loading').classList.add('hidden'); return; }
  $('loading-text').textContent = msg;
  $('loading').classList.remove('hidden');
}

function dedupeRows(rows, idx) {
  const seen = new Set();
  const out = [];
  for (const row of rows) {
    const ean = String(row[idx.ean] ?? '').trim();
    const bnr = String(row[idx.bnr] ?? '').trim();
    const key = ean || bnr;
    if (!key) { out.push(row); continue; }
    if (seen.has(key)) continue;
    seen.add(key);
    out.push(row);
  }
  return out;
}

function detectLayout(json) {
  const HEADER_TOKENS = ['bnr', 'ean', 'benämning', 'ink.pris', 'fsg. pris', 'fsg.pris', 'inköpspris', 'artikelnr'];
  const limit = Math.min(json.length, 50);
  let storeName = '';
  let headerRowIdx = 0;

  for (let i = 0; i < limit; i++) {
    const row = json[i] || [];
    for (let c = 0; c < row.length; c++) {
      const cell = String(row[c] ?? '').trim().toLowerCase();
      if (cell === 'butik:' || cell === 'butik') {
        const next = String(row[c + 1] ?? '').trim();
        if (next) { storeName = parseStoreName(next); break; }
        for (let j = i + 1; j < Math.min(json.length, i + 5); j++) {
          const v = String((json[j] || [])[c] ?? '').trim()
                 || String((json[j] || [])[0] ?? '').trim();
          if (v) { storeName = parseStoreName(v); break; }
        }
        break;
      }
    }
    if (storeName) break;
  }

  for (let i = 0; i < limit; i++) {
    const lower = (json[i] || []).map(c => String(c ?? '').trim().toLowerCase());
    const hits = HEADER_TOKENS.filter(t => lower.some(c => c === t || c.includes(t))).length;
    if (hits >= 2) { headerRowIdx = i; break; }
  }

  return { storeName, headerRowIdx };
}

function parseStoreName(s) {
  const m = String(s).match(/^\s*\d+\s*[-–—]\s*(.+)$/);
  return (m ? m[1] : s).trim();
}

function autoMap() {
  const lower = headers.map(h => h.toLowerCase());
  const idx = {};
  for (const f of FIELDS) {
    let i = -1;
    for (const term of AUTO_MAP[f]) {
      i = lower.findIndex(h => h.includes(term));
      if (i !== -1) break;
    }
    idx[f] = i;
  }
  let ki = -1;
  for (const term of KATEGORI_TERMS) {
    ki = lower.findIndex(h => h === term || h.includes(term));
    if (ki !== -1) break;
  }
  idx.kategori = ki;
  return idx;
}

function parseCategory(v) {
  if (typeof v === 'number') return Math.trunc(v);
  if (v == null || v === '') return NaN;
  const n = parseInt(String(v).trim(), 10);
  return isNaN(n) ? NaN : n;
}

function formatCategory(k) {
  if (k == null || isNaN(k)) return '';
  const name = CATEGORY_NAMES[k];
  return name ? `${k} - ${name}` : String(k);
}

function getActiveIgnoreSet() {
  const set = new Set();
  document.querySelectorAll('input[data-cat]:checked').forEach(el => {
    const n = parseInt(el.dataset.cat, 10);
    if (!isNaN(n)) set.add(n);
  });
  return set;
}

function applyCategoryFilter() {
  const ignoreSet = getActiveIgnoreSet();
  if (columnIdx && columnIdx.kategori !== -1 && ignoreSet.size) {
    rows = dedupedRows.filter(r => !ignoreSet.has(parseCategory(r[columnIdx.kategori])));
  } else {
    rows = dedupedRows.slice();
  }
  ignoredByCategory = dedupedRows.length - rows.length;
}

function parseNum(v) {
  if (typeof v === 'number') return v;
  if (v == null || v === '') return NaN;
  const s = String(v).replace(/\s|kr|sek/gi, '').replace(',', '.');
  const n = parseFloat(s);
  return isNaN(n) ? NaN : n;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function analyze() {
  if (!columnIdx) return;
  applyCategoryFilter();
  const idx = columnIdx;

  const minBuy = parseFloat($('min-buy').value);
  const minMargin = parseFloat($('min-margin').value);
  const maxMargin = parseFloat($('max-margin').value);

  results = [];

  for (const row of rows) {
    const buy = parseNum(row[idx.buy]);
    const sales = parseNum(row[idx.sales]);
    const validPrices = !isNaN(buy) && !isNaN(sales);
    const margin = (validPrices && sales > 0) ? (sales - buy) / sales * 100 : NaN;

    const reasons = [];
    if (!validPrices) reasons.push({ text: 'Missing price', level: 'warn' });
    if (!isNaN(buy) && buy < minBuy) reasons.push({ text: `Buy < ${minBuy}`, level: 'warn' });
    if (validPrices && sales <= 0 && buy > 0) {
      reasons.push({ text: 'Sales ≤ 0', level: 'danger' });
    } else if (!isNaN(margin) && !isNaN(minMargin) && margin < minMargin) {
      reasons.push({ text: `Margin ${margin.toFixed(1)}%`, level: margin < 0 ? 'danger' : 'warn' });
    }
    if (!isNaN(margin) && !isNaN(maxMargin) && margin > maxMargin) {
      reasons.push({ text: `Margin ${margin.toFixed(1)}%`, level: 'warn' });
    }

    if (reasons.length) {
      results.push({
        ean: row[idx.ean] ?? '',
        bnr: row[idx.bnr] ?? '',
        name: row[idx.name] ?? '',
        kategori: idx.kategori !== -1 ? parseCategory(row[idx.kategori]) : NaN,
        buy, sales, margin, reasons
      });
    }
  }

  renderResults();
}

const RULES_STORAGE_KEY = 'exportfil-netto:rules';

function loadRules() {
  try {
    const raw = localStorage.getItem(RULES_STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (Number.isFinite(saved.minBuy)) $('min-buy').value = saved.minBuy;
    if (Number.isFinite(saved.minMargin)) $('min-margin').value = saved.minMargin;
    if (Number.isFinite(saved.maxMargin)) $('max-margin').value = saved.maxMargin;
    if (saved.ignored && typeof saved.ignored === 'object') {
      document.querySelectorAll('input[data-cat]').forEach(el => {
        if (el.dataset.cat in saved.ignored) el.checked = !!saved.ignored[el.dataset.cat];
      });
    }
  } catch {}
}

function saveRules() {
  try {
    const ignored = {};
    document.querySelectorAll('input[data-cat]').forEach(el => {
      ignored[el.dataset.cat] = el.checked;
    });
    localStorage.setItem(RULES_STORAGE_KEY, JSON.stringify({
      minBuy: parseFloat($('min-buy').value),
      minMargin: parseFloat($('min-margin').value),
      maxMargin: parseFloat($('max-margin').value),
      ignored,
    }));
  } catch {}
}

function onRuleChange() { saveRules(); analyze(); }

['min-buy', 'min-margin', 'max-margin'].forEach(id => {
  $(id).addEventListener('change', onRuleChange);
});
document.querySelectorAll('input[data-cat]').forEach(el => {
  el.addEventListener('change', onRuleChange);
});

loadRules();

function renderResults() {
  $('results-card').classList.remove('hidden');
  const dupStat = duplicatesRemoved
    ? `<div class="stat"><strong>${duplicatesRemoved.toLocaleString()}</strong><span class="muted">Duplicates removed</span></div>`
    : '';
  const ignoredStat = ignoredByCategory
    ? `<div class="stat"><strong>${ignoredByCategory.toLocaleString()}</strong><span class="muted">Ignored by category</span></div>`
    : '';
  $('stats').innerHTML = `
    <div class="stat"><strong>${results.length.toLocaleString()}</strong><span class="muted">Flagged articles</span></div>
    <div class="stat"><strong>${rows.length.toLocaleString()}</strong><span class="muted">Unique articles</span></div>
    ${dupStat}
    ${ignoredStat}
    <div class="stat"><strong>${(results.length / rows.length * 100 || 0).toFixed(1)}%</strong><span class="muted">Flag rate</span></div>
  `;

  if (!results.length) {
    $('display-note').classList.add('hidden');
    $('table-wrap').innerHTML = '<div class="empty">No anomalies found.</div>';
    return;
  }

  const displayed = results.slice(0, DISPLAY_CAP);
  if (results.length > DISPLAY_CAP) {
    $('display-note').textContent = `Showing first ${DISPLAY_CAP.toLocaleString()} of ${results.length.toLocaleString()} flagged articles. Download to see all.`;
    $('display-note').classList.remove('hidden');
  } else {
    $('display-note').classList.add('hidden');
  }

  const fmt = (n) => isNaN(n) ? '' : n.toLocaleString('sv-SE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtPct = (n) => isNaN(n) ? '' : n.toFixed(1) + '%';
  const rowsHtml = displayed.map(r => `
    <tr>
      <td>${escapeHtml(r.ean)}</td>
      <td>${escapeHtml(r.bnr)}</td>
      <td>${escapeHtml(r.name)}</td>
      <td>${escapeHtml(formatCategory(r.kategori))}</td>
      <td class="num">${fmt(r.buy)}</td>
      <td class="num">${fmt(r.sales)}</td>
      <td class="num">${fmtPct(r.margin)}</td>
    </tr>
  `).join('');
  $('table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>EAN</th><th>BNR</th><th>Product name</th><th>Category</th>
        <th style="text-align: right;">Buy</th><th style="text-align: right;">Sales</th><th style="text-align: right;">Margin</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  `;
}

function downloadExcel() {
  if (!results.length) return;
  const eanStr = (v) => (v === '' || v == null) ? '' : String(v).replace(/\.0+$/, '');
  const data = results.map(r => ({
    EAN: eanStr(r.ean),
    BNR: eanStr(r.bnr),
    'Product name': r.name,
    'Category': formatCategory(r.kategori),
    'Buy price': isNaN(r.buy) ? '' : r.buy,
    'Sales price': isNaN(r.sales) ? '' : r.sales,
    'Margin (%)': isNaN(r.margin) ? '' : Math.round(r.margin * 10) / 10
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [{ wch: 16 }, { wch: 12 }, { wch: 40 }, { wch: 28 }, { wch: 12 }, { wch: 12 }, { wch: 12 }];

  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let R = range.s.r + 1; R <= range.e.r; R++) {
    for (const C of [0, 1]) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      const cell = ws[addr];
      if (cell && cell.v !== '' && cell.v != null) {
        cell.t = 's';
        cell.v = String(cell.v);
        cell.z = '@';
      }
    }
  }

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Netto');
  const base = storeName || sourceFilename || 'exportfil-netto';
  XLSX.writeFile(wb, `${base} netto.xlsx`);
}

$('download').addEventListener('click', downloadExcel);

$('reset').addEventListener('click', () => {
  headers = []; rows = []; dedupedRows = []; results = []; columnIdx = null; storeName = '';
  rawRowCount = 0; duplicatesRemoved = 0; ignoredByCategory = 0;
  fileInput.value = '';
  $('file-info').classList.add('hidden');
  $('results-card').classList.add('hidden');
  $('display-note').classList.add('hidden');
  setLoading(null);
  clearError();
});
</script>
</body>
</html>
